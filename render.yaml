services:
  - type: web
    name: fluxo-ai
    runtime: docker
    region: ohio
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: KIE_API_KEY
        sync: false
